name: AFH Auto GTM

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-auto-gtm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install openai anthropic
          fi

      - name: Run auto GTM (ChatGPT only)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 scripts/auto_gtm_from_keeps.py

      - name: Commit results
        run: |
          git config user.name "afh-bot"
          git config user.email "afh-bot@users.noreply.github.com"

          for p in gtm scripts/ai_costs.csv; do
            if [ -e "$p" ]; then
              git add -A "$p"
            fi
          done

          git commit -m "Auto GTM run $(date +%F)" || echo "No changes to commit"
          git push
