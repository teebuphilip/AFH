# .github/workflows/afh_pipeline.yml
name: AFH Daily Pipeline

on:
  schedule:
    # Run once daily at 09:00 UTC (adjust if needed)
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      AFH_KEEP_TARGET: "100"
      AFH_KEEP_WINDOW_DAYS: "30"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install scikit-learn openai anthropic
          fi

      - name: Set run date
        run: echo "AFH_RUN_DATE=$(date +%F)" >> $GITHUB_ENV

      - name: Create log directory
        run: |
          mkdir -p logs/${AFH_RUN_DATE}

      - name: Run AFH pipeline (v2.0)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -e
          python3 claude_created_0.0_run_afh_pipeline.py \
            > logs/${AFH_RUN_DATE}/pipeline.log 2>&1

      - name: Run integrity checks
        continue-on-error: true
        run: |
          if [ -f "./scripts/afh-check.sh" ]; then
            ./scripts/afh-check.sh > logs/${AFH_RUN_DATE}/integrity.log 2>&1
          else
            echo "Integrity check script not found, skipping"
          fi

      - name: Build daily stats email
        run: |
          python3 codex_created_11.0_daily_stats_email.py > /tmp/afh_daily_email.txt
          echo "AFH_DAILY_EMAIL_BODY<<EOF" >> $GITHUB_ENV
          cat /tmp/afh_daily_email.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Validate email secrets
        run: |
          if [ -z "${ALERT_EMAIL_TO}" ]; then
            echo "Missing ALERT_EMAIL_TO"; exit 1; fi
          if [ -z "${{ secrets.ALERT_EMAIL_USER }}" ]; then
            echo "Missing ALERT_EMAIL_USER"; exit 1; fi
          if [ -z "${{ secrets.ALERT_EMAIL_PASS }}" ]; then
            echo "Missing ALERT_EMAIL_PASS"; exit 1; fi

      - name: Commit results
        run: |
          git config user.name "afh-bot"
          git config user.email "afh-bot@users.noreply.github.com"

          for p in data catalogs metrics "logs/${AFH_RUN_DATE}"; do
            if [ -e "$p" ]; then
              git add -A "$p"
            fi
          done

          git commit -m "AFH pipeline run ${AFH_RUN_DATE} (v2.0 run-specific)" || echo "No changes to commit"
          git push

      - name: Email daily stats
        if: ${{ success() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "AFH DAILY STATS — ${{ env.AFH_RUN_DATE }}"
          body: ${{ env.AFH_DAILY_EMAIL_BODY }}
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "AFH Pipeline <afh-alerts@local>"

      - name: Email alert on failure
        if: ${{ failure() && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.ALERT_EMAIL_USER }}
          password: ${{ secrets.ALERT_EMAIL_PASS }}
          subject: "AFH PIPELINE FAILED — ${{ env.AFH_RUN_DATE }}"
          body: |
            AFH pipeline failed.

            Date: ${{ env.AFH_RUN_DATE }}
            Repo: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run ID: ${{ github.run_id }}

            Check logs:
            logs/${{ env.AFH_RUN_DATE }}/

          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "AFH Pipeline <afh-alerts@local>"
